<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access Portal</title>
<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:360px;
  background:#fff;
  padding:30px;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.logo{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}
.logo span{color:#2563eb;}

.subtitle{
  text-align:center;
  font-size:13px;
  color:#666;
  margin-bottom:25px;
}

label{
  font-size:13px;
  color:#444;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0 15px;
  border:1px solid #ddd;
  border-radius:6px;
  font-size:14px;
}

input:focus{
  border-color:#2563eb;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  background:#2563eb;
  border:none;
  color:white;
  font-size:14px;
  border-radius:6px;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.footer{
  text-align:center;
  font-size:11px;
  color:#aaa;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">en<span>finity</span></div>
  <div class="subtitle">Secure Employee Access Portal</div>

  <form onsubmit="handleLogin(event)">
    <label>Email Address</label>
    <input type="email" required>

    <label>Password</label>
    <input type="password" required>

    <button type="submit">Sign In</button>
  </form>

  <div class="footer">
    Internal system • Authorized access only
  </div>
</div>

<script>
function handleLogin(e){
  e.preventDefault();

  // ⚠️ No data stored (safe simulation)

  alert("Security Awareness Test\n\nYou just attempted to enter credentials on a simulated phishing page.\n\nAlways verify links before logging in.");

  // redirect to your page
  window.location.href = "https://shabbirspro.github.io/portalsss/";
}
</script>

</body>
</html>
