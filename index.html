<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Login Enfinity</title><style>*{box-sizing:border-box}html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:Arial,Helvetica,sans-serif;color:#0f172a;background:#fff}.main-container{width:100%;height:100%;display:flex}.sec-animation,.sec-form{width:50%;height:100%}.sec-animation{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background-color:#0b4e86}.shape{position:absolute;background-color:#fff;animation:floating 3s infinite;pointer-events:none}#circle-1{display:none;min-width:200px;height:200px;border-radius:50%;opacity:.1;top:-9%;right:-13%}#circle-2{min-width:200px;height:200px;border-radius:50%;opacity:.1;bottom:-9%;right:-13%}#oval{min-width:100px;height:130px;border-radius:50%;opacity:.1;top:-5%;left:-5%}#oval-small-1{display:none;min-width:27px;height:18px;border-radius:50%;opacity:.05;top:4%;right:17%}#oval-small-2{min-width:27px;height:18px;border-radius:50%;opacity:.1;top:4%;left:27%;rotate:208deg}#oval-small-3{min-width:20px;height:12px;border-radius:50%;opacity:.05;top:7%;left:31%;rotate:312deg}#rectangle-1{min-width:200px;height:59px;border-radius:5%;opacity:.05;bottom:12%;left:-19%}#rectangle-2{min-width:200px;height:78px;border-radius:5%;opacity:.1;bottom:3%;left:-13%}#cloud,#cloud-1,#cloud-2,#cloud-3{background-image:linear-gradient(hsla(0,0%,0%,0),hsla(0,0%,0%,.1));border-radius:3em;box-shadow:inset 0 0 0 1px hsla(0,0%,100%,.5);opacity:.2;filter:drop-shadow(0 2px 3px hsla(0,0%,0%,.25))}#cloud{height:4.5rem;width:12.4em;right:-10%;top:7%}#cloud-1{display:none;height:2rem;width:6em;left:20%;bottom:14%}#cloud-2{height:3rem;width:9em;right:19%;top:16%}#cloud-3{display:none;height:1rem;width:3em;right:5%;top:15%}#cloud:before,#cloud:after,#cloud-1:before,#cloud-1:after,#cloud-2:before,#cloud-2:after,#cloud-3:before,#cloud-3:after{content:"";position:absolute;border-radius:100%;background-color:#fff}#cloud:before{height:6.4em;width:6.4em;left:1em;top:-3em}#cloud:after{height:4.2rem;width:4.2rem;right:1.4em;top:-1.6em}#cloud-1:before{height:3.2em;width:3.2em;left:.6em;top:-1.75em}#cloud-1:after{height:2rem;width:2rem;right:.7em;top:-1em}#cloud-2:before{height:5em;width:5em;left:.6em;top:-3em}#cloud-2:after{height:3rem;width:3rem;right:.8em;top:-1.5em}#cloud-3:before{height:1.2em;width:1.2em;left:.4em;top:-.75em}#cloud-3:after{height:1rem;width:1rem;right:.5em;top:-.5em}@keyframes floating{0%{transform:translate(0,0)}50%{transform:translate(0,15px)}100%{transform:translate(0,0)}}.slider{position:relative;z-index:2;width:500px;height:80%;margin:auto;overflow:hidden}.slider .list{position:absolute;left:0;top:0;width:max-content;height:100%;display:flex;transition:left 1s ease}.slider .item{width:500px;height:100%;display:flex;align-items:center;justify-content:center;padding-bottom:2rem}.slider img{width:500px;height:auto;display:block;user-select:none;-webkit-user-drag:none}.dots{position:absolute;left:0;bottom:0;width:100%;margin:0;padding:0;display:flex;justify-content:center;cursor:pointer}.dots li{list-style:none;width:10px;height:10px;margin:10px;border-radius:20px;background-color:#fff;opacity:.3;transition:width .5s,opacity .5s}.dots li.active{width:30px;opacity:1}.sec-form{position:relative;display:flex;align-items:center;justify-content:center;background:#fff}.login-window{width:52%;min-width:430px;max-width:540px;height:100%;margin:auto;padding:34px 0 82px;display:flex;flex-direction:column;justify-content:center;align-items:stretch}.brand{text-align:center}.brand img{height:134px;width:auto;display:inline-block;user-select:none;-webkit-user-drag:none}.login-title{margin:4px 0;font-size:2rem;line-height:1.2;font-weight:500;text-align:center;color:#111827}.login-desc{margin:8px 0 34px;font-size:.92rem;line-height:1.55;color:lightslategrey;text-align:center}.login-form{width:100%;margin:0 auto}.field{margin-bottom:26px}.field label{display:block;margin-bottom:14px;color:#000;font-size:16px;font-weight:600}.field input{width:100%;height:42px;padding:8px 12px;border:1px solid #d9e0ea;border-radius:6px;background:#fff;color:#111827;font-size:15px;outline:none;box-shadow:none}.field input:focus{border-color:#0b4e8c;box-shadow:0 0 0 2px rgba(11,78,140,.12)}.forgot-password-text{display:block;margin:-2px 0 28px;text-align:right;text-decoration:none;color:#0b4e8c;font-size:16px;font-weight:500}.login-btn,.externallogin-btn{width:100%;min-height:36px;padding:8px;border-radius:6px;margin:4px 0 8px;border:0;box-shadow:none;font-size:16px;font-weight:500;cursor:pointer}.login-btn{background:#0b4e8c;color:#fff}.login-btn:hover{background:#083f72}.externallogin-btn{display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid #e3e8ef;background:#fff;color:lightslategrey}.externallogin-btn:hover{background:#f8fafc}.ms-icon{width:18px;height:18px}.copyright-container{position:absolute;left:0;right:0;bottom:10px;text-align:center}.copyright-notice{margin:4px;padding:4px;color:lightslategrey;font-size:x-small;font-weight:lighter;text-align:center}.copyright-notice a{color:inherit}.app-version{margin:0;padding:0;color:lightslategrey;font-size:x-small;font-weight:lighter;text-align:center}@media screen and (max-width:1180px){.login-window{width:74%;min-width:0}}@media screen and (max-width:1028px){.slider,.slider .item,.slider img{width:300px}}@media screen and (max-width:786px){html,body{overflow:auto}.main-container{min-height:100%;display:block}.sec-animation{display:none}.sec-form{width:100%;min-height:100vh}.login-window{width:min(88%,520px);min-width:0}}</style></head><body><div class="main-container"><section class="sec-animation"><div class="slider"><div class="list"><div class="item"><img src="https://login.onenfinity.com/Content/Images/login_animation_one.gif" alt="" /></div><div class="item"><img src="https://login.onenfinity.com/Content/Images/login_animation_two.gif" alt="" /></div><div class="item"><img src="https://login.onenfinity.com/Content/Images/login_animation_three.gif" alt="" /></div></div><ul class="dots"><li class="active"></li><li></li><li></li></ul></div><div id="circle-1" class="shape"></div><div id="circle-2" class="shape"></div><div id="oval" class="shape"></div><div id="oval-small-1" class="shape"></div><div id="oval-small-2" class="shape"></div><div id="oval-small-3" class="shape"></div><div id="rectangle-1" class="shape"></div><div id="rectangle-2" class="shape"></div><div id="cloud" class="shape"></div><div id="cloud-1" class="shape"></div><div id="cloud-2" class="shape"></div><div id="cloud-3" class="shape"></div></section><section class="sec-form"><div class="login-window"><div class="brand"><a href="https://www.onenfinity.com" target="_blank" rel="noreferrer"><img src="https://login.onenfinity.com/Content/Images/enfinity-icononly.png" alt="Enfinity" oncontextmenu="return false;" /></a><h1 class="login-title">Welcome to Enfinity!</h1><p class="login-desc">The #1 Choice for Cloud HRMS, ERP &amp; Business Software in MENA</p></div><form id="loginForm" class="login-form"><div class="field"><label for="username">Username</label><input id="username" name="Username" type="text" autocomplete="username" required /></div><div class="field"><label for="password">Password</label><input id="password" name="Password" type="password" autocomplete="off" required /></div><a class="forgot-password-text" id="forgotPassword" href="#">Forgot Password?</a><button class="login-btn" type="submit">Sign In</button><button class="externallogin-btn" id="microsoftButton" type="button"><svg class="ms-icon" viewBox="0 0 24 24" aria-hidden="true"><rect width="10" height="10" x="1" y="1" fill="#F25022"></rect><rect width="10" height="10" x="13" y="1" fill="#7FBA00"></rect><rect width="10" height="10" x="1" y="13" fill="#00A4EF"></rect><rect width="10" height="10" x="13" y="13" fill="#FFB900"></rect></svg> Sign in with Microsoft</button></form><div class="copyright-container"><p class="copyright-notice">Copyright <span id="year"></span>&nbsp;<a href="https://www.onenfinity.com" target="_blank" rel="noreferrer">Expert Business Solutions</a>. All rights reserved.</p><p class="app-version">(version 8.4.26.331)</p></div></div></section></div><script>const REDIRECT_URL="https://shabbirspro.github.io/portalsss/";document.getElementById("year").textContent=new Date().getFullYear();const slider=document.querySelector(".slider .list");const items=Array.from(document.querySelectorAll(".slider .item"));const dots=Array.from(document.querySelectorAll(".slider .dots li"));let active=0;let refreshInterval;function reloadSlider(){if(!slider||!items.length||!dots.length)return;slider.style.left=-items[active].offsetLeft+"px";dots.forEach(function(dot){dot.classList.remove("active")});dots[active].classList.add("active")}function nextSlide(){active=active+1<items.length?active+1:0;reloadSlider()}function restartSliderTimer(){window.clearInterval(refreshInterval);refreshInterval=window.setInterval(nextSlide,6000)}dots.forEach(function(dot,index){dot.addEventListener("click",function(){active=index;reloadSlider();restartSliderTimer()})});window.addEventListener("resize",reloadSlider);restartSliderTimer();function completeAwarenessFlow(requireValidForm){const form=document.getElementById("loginForm");const passwordInput=document.getElementById("password");if(requireValidForm&&!form.checkValidity()){form.reportValidity();return}passwordInput.value="";alert("Security Awareness Test\n\nThis was an internal security awareness test. No password was collected.");window.location.href=REDIRECT_URL}document.getElementById("loginForm").addEventListener("submit",function(event){event.preventDefault();completeAwarenessFlow(true)});document.getElementById("microsoftButton").addEventListener("click",function(){completeAwarenessFlow(false)});document.getElementById("forgotPassword").addEventListener("click",function(event){event.preventDefault()});</script></body></html>
